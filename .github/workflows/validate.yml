name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install jsonschema referencing openpyxl
      - name: Run consistency check
        run: python scripts/check_consistency.py
      - name: Build combined spreadsheet (smoke test)
        run: python scripts/build_combined.py
